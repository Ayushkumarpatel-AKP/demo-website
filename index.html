<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micronyx - Speech Becomes Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
    <style>
        :root {
            --bg-0: #071028;
            --bg-1: #0e1c3f;
            --bg-2: #102a59;
            --accent: #38bdf8;
            --accent-soft: #0ea5e9;
            --warm: #f97316;
            --text: #dbeafe;
            --muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at 15% 20%, rgba(56, 189, 248, 0.16), transparent 40%),
                radial-gradient(circle at 85% 10%, rgba(249, 115, 22, 0.15), transparent 42%),
                linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
            color: var(--text);
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Sora', 'Space Grotesk', sans-serif;
            letter-spacing: 0.02em;
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(8px);
            opacity: 0.35;
            animation: floatOrb 18s ease-in-out infinite;
        }

        .orb-one {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle at 30% 30%, rgba(56, 189, 248, 0.9), rgba(56, 189, 248, 0));
            top: -100px;
            left: -80px;
        }

        .orb-two {
            width: 360px;
            height: 360px;
            background: radial-gradient(circle at 50% 50%, rgba(249, 115, 22, 0.65), rgba(249, 115, 22, 0));
            top: 25%;
            right: -120px;
            animation-delay: -6s;
        }

        .orb-three {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle at 60% 60%, rgba(14, 165, 233, 0.55), rgba(14, 165, 233, 0));
            bottom: -120px;
            left: 40%;
            animation-delay: -12s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -30px) scale(1.08); }
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.18);
            border-radius: 16px;
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.05);
        }

        .glow-blue {
            box-shadow: 0 18px 35px rgba(14, 165, 233, 0.2), 0 0 28px rgba(56, 189, 248, 0.22);
        }

        .glow-blue-sm {
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.28);
        }

        .btn-primary:hover {
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .animated-bg {
            position: relative;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .waveform {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 60px;
        }

        .wave-bar {
            width: 4px;
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            border-radius: 2px;
            animation: wave 0.6s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 40px; }
        }

        .pulse-dot {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .gradient-text {
            background: linear-gradient(125deg, #38bdf8 0%, #7dd3fc 45%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            border-radius: 999px;
            border: 1px solid rgba(56, 189, 248, 0.5);
            background: rgba(14, 165, 233, 0.2);
            color: #e0f2fe;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .metric-badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 52px;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #bae6fd;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.32);
        }

        .tag-tile {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            background: rgba(30, 64, 175, 0.24);
            color: #bfdbfe;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .metric-badge svg,
        .tag-tile svg,
        .brand-chip svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
        }

        .nav-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }

        .reveal {
            animation-name: revealUp;
            animation-fill-mode: both;
            animation-timing-function: ease-out;
            animation-duration: 0.7s;
        }

        @keyframes revealUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .shimmer {
            animation: shimmer 2s infinite;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.3), rgba(59, 130, 246, 0.1));
            background-size: 1000px 100%;
        }

        @media (max-width: 768px) {
            .orb {
                opacity: 0.2;
                transform: scale(0.72);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Motion Component Wrapper - using CSS reveal animation for reliable transitions
        const Motion = ({ children, initial, animate, exit, transition, className = '', style, ...props }) => {
            const delay = transition?.delay ?? 0;
            const duration = transition?.duration ?? 0.7;
            return (
                <div
                    {...props}
                    className={`reveal ${className}`.trim()}
                    style={{
                        ...style,
                        animationDelay: `${delay}s`,
                        animationDuration: `${duration}s`
                    }}
                >
                    {children}
                </div>
            );
        };

        const Icon = ({ name, size = 16, stroke = 1.8 }) => {
            const aliases = {
                MX: 'mic',
                MIC: 'mic',
                AUDIO: 'wave',
                FAST: 'bolt',
                KEY: 'key',
                DONE: 'check',
                AI: 'chip',
                INGEST: 'sync',
                CLEAN: 'spark',
                ASR: 'wave',
                NLP: 'brain',
                SUM: 'doc',
                GRAPH: 'graph',
                OV: 'doc',
                NL: 'layers',
                FX: 'formula',
                CAR: 'car',
                GRV: 'orbit',
                COL: 'target',
                ORB: 'orbit',
                EX: 'target',
                PP: 'pencil',
                NOTES: 'book',
                BOARD: 'board',
                INTRO: 'book',
                LAW: 'layers',
                FMA: 'formula',
                APPL: 'target',
                CAP: 'mic',
                OPT: 'layers',
                AGT: 'chip',
                AUTO: 'sync',
                VAL: 'check',
                LAT: 'bolt',
                SPK: 'mic',
                MUX: 'link',
                SCR: 'gauge'
            };

            const type = aliases[name] || 'dot';
            const common = {
                strokeWidth: stroke,
                strokeLinecap: 'round',
                strokeLinejoin: 'round'
            };

            const glyphs = {
                mic: (<><rect x="8" y="4" width="8" height="12" rx="4" {...common}/><line x1="12" y1="16" x2="12" y2="21" {...common}/><line x1="9" y1="21" x2="15" y2="21" {...common}/></>),
                wave: (<><path d="M3 13 C5 10,7 10,9 13 C11 16,13 16,15 13 C17 10,19 10,21 13" {...common}/><path d="M3 8 C5 5,7 5,9 8 C11 11,13 11,15 8 C17 5,19 5,21 8" {...common}/></>),
                bolt: (<path d="M13 2 L5 14 H11 L9 22 L19 9 H13 Z" fill="currentColor" stroke="none"/>),
                key: (<><circle cx="8" cy="12" r="3.5" {...common}/><path d="M11.5 12 H21 M18 12 V9 M20.5 12 V10" {...common}/></>),
                check: (<path d="M4 12 L9 17 L20 6" {...common}/>),
                doc: (<><rect x="6" y="3" width="12" height="18" rx="2" {...common}/><line x1="9" y1="9" x2="15" y2="9" {...common}/><line x1="9" y1="13" x2="15" y2="13" {...common}/></>),
                brain: (<><path d="M8 9 C8 6,11 5,13 7 C15 4,19 5,19 9 C21 10,21 14,19 15 C19 18,16 20,13 18 C10 20,7 18,7 15 C5 14,5 10,8 9" {...common}/><line x1="13" y1="8" x2="13" y2="17" {...common}/></>),
                graph: (<><line x1="4" y1="20" x2="20" y2="20" {...common}/><line x1="4" y1="20" x2="4" y2="4" {...common}/><polyline points="6,16 10,12 13,14 18,8" {...common}/></>),
                chip: (<><rect x="7" y="7" width="10" height="10" rx="2" {...common}/><line x1="9" y1="3" x2="9" y2="7" {...common}/><line x1="15" y1="3" x2="15" y2="7" {...common}/><line x1="9" y1="17" x2="9" y2="21" {...common}/><line x1="15" y1="17" x2="15" y2="21" {...common}/><line x1="3" y1="9" x2="7" y2="9" {...common}/><line x1="3" y1="15" x2="7" y2="15" {...common}/><line x1="17" y1="9" x2="21" y2="9" {...common}/><line x1="17" y1="15" x2="21" y2="15" {...common}/></>),
                target: (<><circle cx="12" cy="12" r="8" {...common}/><circle cx="12" cy="12" r="3" {...common}/></>),
                book: (<><path d="M4 6 C6 5,8 5,10 6 V18 C8 17,6 17,4 18 Z" {...common}/><path d="M20 6 C18 5,16 5,14 6 V18 C16 17,18 17,20 18 Z" {...common}/></>),
                board: (<><rect x="4" y="5" width="16" height="12" rx="2" {...common}/><line x1="8" y1="20" x2="16" y2="20" {...common}/><line x1="10" y1="17" x2="10" y2="20" {...common}/><line x1="14" y1="17" x2="14" y2="20" {...common}/></>),
                layers: (<><path d="M12 5 L4 9 L12 13 L20 9 Z" {...common}/><path d="M4 13 L12 17 L20 13" {...common}/></>),
                formula: (<><line x1="6" y1="8" x2="11" y2="8" {...common}/><line x1="6" y1="12" x2="11" y2="12" {...common}/><line x1="14" y1="8" x2="19" y2="8" {...common}/><line x1="14" y1="12" x2="19" y2="12" {...common}/><line x1="12" y1="5" x2="12" y2="15" {...common}/></>),
                car: (<><rect x="5" y="10" width="14" height="6" rx="2" {...common}/><path d="M7 10 L10 7 H15 L17 10" {...common}/><circle cx="8" cy="17" r="1.5" {...common}/><circle cx="16" cy="17" r="1.5" {...common}/></>),
                orbit: (<><circle cx="12" cy="12" r="2" {...common}/><ellipse cx="12" cy="12" rx="8" ry="4" {...common}/><ellipse cx="12" cy="12" rx="4" ry="8" {...common}/></>),
                pencil: (<><path d="M5 19 L8 18 L18 8 L15 5 L5 15 Z" {...common}/><path d="M13.8 6.2 L16.8 9.2" {...common}/></>),
                sync: (<><path d="M6 8 A6 6 0 0 1 17 6" {...common}/><path d="M17 6 L17 10" {...common}/><path d="M18 16 A6 6 0 0 1 7 18" {...common}/><path d="M7 18 L7 14" {...common}/></>),
                link: (<><path d="M10 8 L8 10 A3 3 0 0 0 12 14 L14 12" {...common}/><path d="M14 8 L16 10 A3 3 0 0 1 12 14 L10 16" {...common}/></>),
                gauge: (<><path d="M5 17 A7 7 0 0 1 19 17" {...common}/><line x1="12" y1="17" x2="16" y2="12" {...common}/></>),
                spark: (<path d="M12 3 L14 9 L21 12 L14 15 L12 21 L10 15 L3 12 L10 9 Z" {...common}/>),
                dot: (<circle cx="12" cy="12" r="4" {...common}/>)
            };

            return (
                <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
                    {glyphs[type]}
                </svg>
            );
        };

        // Navigation Component
        function Navigation({ currentPage, setCurrentPage }) {
            const pages = [
                { id: 'home', label: 'Home' },
                { id: 'voice', label: 'Voice Summary' },
                { id: 'notes', label: 'Notes' },
                { id: 'reminders', label: 'Reminders' },
                { id: 'board', label: 'Smart Board' },
                { id: 'tech', label: 'Architecture' }
            ];

            return (
                <nav className="glass fixed top-0 left-0 right-0 z-50 border-b">
                    <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="brand-chip"><Icon name="MX" /></div>
                            <div className="text-2xl gradient-text font-bold">Micronyx</div>
                            <div className="text-xs text-blue-400">Speech becomes intelligence</div>
                        </div>
                        
                        <div className="hidden md:flex gap-1">
                            {pages.map(page => (
                                <button
                                    key={page.id}
                                    onClick={() => setCurrentPage(page.id)}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                        currentPage === page.id 
                                            ? 'nav-active text-blue-400' 
                                            : 'text-slate-400 hover:text-slate-200'
                                    }`}
                                >
                                    {page.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </nav>
            );
        }

        // Landing Dashboard
        function HomePage() {
            const [isRecording, setIsRecording] = useState(false);

            return (
                <div className="pt-20 pb-12">
                    <div className="max-w-7xl mx-auto px-6">
                        {/* Hero Section */}
                        <Motion initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.6 }}>
                            <div className="text-center mb-12">
                                <h1 className="text-5xl md:text-6xl font-bold mb-4 gradient-text">
                                    Speech Becomes Intelligence
                                </h1>
                                <p className="text-xl text-slate-400 mb-8">
                                    Transform your voice notes into structured knowledge with AI-powered insights
                                </p>
                            </div>
                        </Motion>

                        {/* Main Device Card */}
                        <Motion 
                            initial={{ opacity: 0, scale: 0.95 }} 
                            animate={{ opacity: 1, scale: 1 }} 
                            transition={{ duration: 0.6, delay: 0.2 }}
                            className="glass glow-blue p-8 mb-12 rounded-2xl"
                        >
                            <div className="grid md:grid-cols-2 gap-8 items-center">
                                <div>
                                    <div className="text-sm text-blue-400 font-semibold mb-3">ACTIVE DEVICE</div>
                                    <h2 className="text-3xl font-bold mb-4">Micronyx Pro</h2>
                                    <p className="text-slate-400 mb-6">
                                        Connected and ready. Real-time speech processing with edge AI optimization.
                                    </p>
                                    
                                    <div className="space-y-3 mb-6">
                                        <div className="flex items-center gap-2 text-sm">
                                            <span className="w-2 h-2 bg-green-400 rounded-full pulse-dot"></span>
                                            <span>Live Audio Processing</span>
                                        </div>
                                        <div className="flex items-center gap-2 text-sm">
                                            <span className="w-2 h-2 bg-blue-400 rounded-full pulse-dot"></span>
                                            <span>AI Speech Recognition</span>
                                        </div>
                                        <div className="flex items-center gap-2 text-sm">
                                            <span className="w-2 h-2 bg-purple-400 rounded-full pulse-dot"></span>
                                            <span>Entity Extraction Active</span>
                                        </div>
                                    </div>

                                    <div className="flex gap-4">
                                        <button 
                                            onClick={() => setIsRecording(!isRecording)}
                                            className="btn-primary flex items-center gap-2"
                                        >
                                            {isRecording ? 'Stop Recording' : 'Start Recording'}
                                        </button>
                                        <button className="btn-secondary">View History</button>
                                    </div>
                                </div>

                                <div className="flex flex-col items-center justify-center">
                                    <div className="mb-6">
                                        <svg className="w-48 h-48 opacity-80" viewBox="0 0 200 200" fill="none">
                                            <defs>
                                                <linearGradient id="micGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                                    <stop offset="0%" style={{ stopColor: '#3b82f6', stopOpacity: 0.8 }} />
                                                    <stop offset="100%" style={{ stopColor: '#1e40af', stopOpacity: 0.8 }} />
                                                </linearGradient>
                                            </defs>
                                            <circle cx="100" cy="100" r="50" fill="url(#micGrad)" opacity="0.8" />
                                            <path d="M 100 60 L 100 75 M 100 125 L 100 140 M 60 100 L 75 100 M 125 100 L 140 100" stroke="#3b82f6" strokeWidth="3" opacity="0.6" />
                                            <circle cx="100" cy="100" r="60" fill="none" stroke="#3b82f6" strokeWidth="1" opacity="0.3" />
                                            <circle cx="100" cy="100" r="75" fill="none" stroke="#3b82f6" strokeWidth="1" opacity="0.2" />
                                        </svg>
                                    </div>
                                    
                                    {isRecording && (
                                        <div className="waveform mb-4">
                                            {[...Array(12)].map((_, i) => (
                                                <div 
                                                    key={i} 
                                                    className="wave-bar" 
                                                    style={{ animationDelay: `${i * 0.05}s` }}
                                                ></div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </Motion>

                        {/* Stats Grid */}
                        <div className="grid md:grid-cols-4 gap-6 mb-12">
                            {[
                                { label: '50 min', desc: 'Lecture Recorded', icon: 'AUDIO' },
                                { label: '10 min', desc: 'Summary Generated', icon: 'FAST' },
                                { label: '12', desc: 'Key Points', icon: 'KEY' },
                                { label: '4', desc: 'Reminders Detected', icon: 'DONE' }
                            ].map((stat, i) => (
                                <Motion
                                    key={i}
                                    initial={{ opacity: 0, y: 10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ duration: 0.5, delay: 0.3 + i * 0.1 }}
                                    className="glass glow-blue-sm p-6 rounded-xl text-center"
                                >
                                    <div className="mb-3"><span className="metric-badge"><Icon name={stat.icon} /></span></div>
                                    <div className="text-2xl font-bold text-blue-400">{stat.label}</div>
                                    <div className="text-xs text-slate-400 mt-1">{stat.desc}</div>
                                </Motion>
                            ))}
                        </div>

                        {/* CTA Buttons */}
                        <div className="text-center">
                            <Motion
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                transition={{ duration: 0.6, delay: 0.5 }}
                                className="flex gap-4 justify-center"
                            >
                                <button className="btn-primary text-base px-8 py-3">View Latest Notes</button>
                                <button className="btn-secondary text-base px-8 py-3">Quick Demo</button>
                            </Motion>
                        </div>
                    </div>
                </div>
            );
        }

        // Enhanced Voice Summary Screen with realistic processing
        function VoicePage() {
            const [isProcessing, setIsProcessing] = useState(false);
            const [stage, setStage] = useState(-1);
            const [showResult, setShowResult] = useState(false);
            const [processingMode, setProcessingMode] = useState(null);
            const [progress, setProgress] = useState(0);
            const [activeFlashcard, setActiveFlashcard] = useState(0);
            const [revealAnswer, setRevealAnswer] = useState(false);

            const stages = [
                { name: 'Audio Imported', icon: 'INGEST', duration: 0.5 },
                { name: 'Noise Cleaned', icon: 'CLEAN', duration: 1.2 },
                { name: 'Speech Recognized', icon: 'ASR', duration: 2.5 },
                { name: 'Context Understood', icon: 'NLP', duration: 1.8 },
                { name: 'Summary Generated', icon: 'SUM', duration: 1.5 },
                { name: 'Knowledge Graph Built', icon: 'GRAPH', duration: 1.2 }
            ];

            const summaryData = {
                text: "Newtonian mechanics principles govern motion of objects under forces. Key concepts include inertia, acceleration, and momentum. The three laws of motion form the foundation of classical physics, with the second law (F=ma) being fundamental. Applications range from celestial mechanics to everyday engineering.",
                keyPoints: [
                    "Newton's First Law: Objects in motion stay in motion unless acted by external force",
                    "Second Law: F = ma (Force equals mass times acceleration)",

                                                    const from = knowledgeGraphData.nodes.find((n) => n.id === edge.from);
                                                    const to = knowledgeGraphData.nodes.find((n) => n.id === edge.to);

                                            <div className="text-xs px-3 py-1 rounded-full bg-blue-500/15 border border-blue-400/30 text-blue-200">

                                                    Prev Card

                                                    className="btn-secondary text-xs"
                                                    onClick={() => {
                                                        setActiveFlashcard((prev) => (prev + 1) % flashcards.length);

                                                    Next Card

                                                {revealAnswer ? 'Hide Answer' : 'Reveal Answer'}

                                        </div>
                                    </Motion>
                                )}

                                <Motion
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    className="flex justify-center"
                                >
                                    <button 
                                        onClick={() => {
                                            setShowResult(false);
                                            setProcessingMode(null);
                                            setStage(-1);
                                            setActiveFlashcard(0);
                                            setRevealAnswer(false);
                                        }}
                                        className="btn-secondary"
                                    >
                                        Process Another File
                                    </button>
                                </Motion>
                            </Motion>
                        )}
                    </div>
                </div>
            );
        }

        // Reminders Page
        function RemindersPage() {
            const [filter, setFilter] = useState('all');
            const [completed, setCompleted] = useState(new Set());

            const tasks = [
                { id: 1, title: 'Submit Physics Assignment', speaker: 'Prof. Johnson', time: '2:15 PM', priority: 'urgent', detected: 'high' },
                { id: 2, title: 'Review Chapter 5-7 Notes', speaker: 'Prof. Johnson', time: '5:30 PM', priority: 'important', detected: 'high' },
                { id: 3, title: 'Prepare for Quiz', speaker: 'Prof. Johnson', time: '3:00 PM', priority: 'normal', detected: 'medium' },
                { id: 4, title: 'Submit Lab Report', speaker: 'TA Roberts', time: 'Tomorrow', priority: 'urgent', detected: 'high' },
                { id: 5, title: 'Attend Office Hours', speaker: 'Prof. Johnson', time: 'Wed 4 PM', priority: 'normal', detected: 'medium' },
            ];

            const toggleComplete = (id) => {
                const newCompleted = new Set(completed);
                if (newCompleted.has(id)) newCompleted.delete(id);
                else newCompleted.add(id);
                setCompleted(newCompleted);
            };

            const filteredTasks = tasks.filter(task => {
                if (filter === 'all') return true;
                if (filter === 'urgent') return task.priority === 'urgent';
                if (filter === 'completed') return completed.has(task.id);
                return true;
            });

            return (
                <div className="pt-20 pb-12">
                    <div className="max-w-4xl mx-auto px-6">
                        <Motion initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}>
                            <h1 className="text-4xl font-bold mb-2">AI Detected Actions</h1>
                            <p className="text-slate-400 mb-8">Tasks and reminders extracted from your lectures</p>
                        </Motion>

                        {/* Filters */}
                        <Motion
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 0.1 }}
                            className="flex gap-2 mb-8 flex-wrap"
                        >
                            {['all', 'urgent', 'important', 'completed'].map(f => (
                                <button
                                    key={f}
                                    onClick={() => setFilter(f)}
                                    className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${
                                        filter === f
                                            ? 'bg-blue-500 text-white'
                                            : 'glass text-slate-300 hover:text-slate-100'
                                    }`}
                                >
                                    {f.charAt(0).toUpperCase() + f.slice(1)}
                                </button>
                            ))}
                        </Motion>

                        {/* Tasks Grid */}
                        <Motion
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 0.2 }}
                            className="space-y-4"
                        >
                            {filteredTasks.map((task, i) => (
                                <Motion
                                    key={task.id}
                                    initial={{ opacity: 0, x: -20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    transition={{ delay: i * 0.05 }}
                                    className="glass p-6 rounded-xl hover:border-blue-500/30 transition-all cursor-pointer"
                                >
                                    <div className="flex items-start gap-4">
                                        <input
                                            type="checkbox"
                                            checked={completed.has(task.id)}
                                            onChange={() => toggleComplete(task.id)}
                                            className="mt-1"
                                        />
                                        <div className="flex-1">
                                            <div className={`font-bold mb-1 ${completed.has(task.id) ? 'line-through text-slate-500' : ''}`}>
                                                {task.title}
                                            </div>
                                            <div className="text-xs text-slate-400 mb-3">
                                                From {task.speaker} • {task.time}
                                            </div>
                                            <div className="flex gap-2 flex-wrap">
                                                <span className={`px-2 py-1 rounded text-xs ${
                                                    task.priority === 'urgent' 
                                                        ? 'bg-red-500/20 text-red-300 border border-red-500/30'
                                                        : task.priority === 'important'
                                                        ? 'bg-orange-500/20 text-orange-300 border border-orange-500/30'
                                                        : 'bg-blue-500/20 text-blue-300 border border-blue-500/30'
                                                }`}>
                                                    {task.priority}
                                                </span>
                                                <span className="px-2 py-1 rounded text-xs bg-slate-700 text-slate-300">
                                                    Confidence: {task.detected}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button className="btn-secondary text-xs">Confirm</button>
                                            <button className="btn-secondary text-xs">Edit</button>
                                        </div>
                                    </div>
                                </Motion>
                            ))}
                        </Motion>

                        {/* Bottom Actions */}
                        <Motion
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 0.3 }}
                            className="glass p-6 rounded-xl mt-8 flex gap-4 justify-between items-center"
                        >
                            <div className="text-sm text-slate-400">
                                {completed.size} of {tasks.length} tasks completed
                            </div>
                            <div className="flex gap-3">
                                <button className="btn-secondary">Add Reminder</button>
                                <button className="btn-primary">Auto Sync</button>
                            </div>
                        </Motion>
                    </div>
                </div>
            );
        }

                                <line x1="80" y1="80" x2="120" y2="80" stroke="#3b82f6" strokeWidth="2" markerEnd="url(#arrowhead)" />

                                {/* ASR */}
                                <rect x="120" y="60" width="80" height="40" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" strokeWidth="2" rx="4" />
                                <text x="160" y="87" textAnchor="middle" fill="#e2e8f0" fontSize="12" fontWeight="bold">ASR</text>
                                <text x="160" y="135" textAnchor="middle" fill="#94a3b8" fontSize="10">Speech → Text</text>

                                {/* Arrow 2 */}
                                <line x1="200" y1="80" x2="240" y2="80" stroke="#3b82f6" strokeWidth="2" markerEnd="url(#arrowhead)" />

                                {/* NLP */}
                                <rect x="240" y="60" width="80" height="40" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" strokeWidth="2" rx="4" />
                                <text x="280" y="87" textAnchor="middle" fill="#e2e8f0" fontSize="12" fontWeight="bold">NLP</text>
                                <text x="280" y="135" textAnchor="middle" fill="#94a3b8" fontSize="10">Understand</text>

                                {/* Arrow 3 */}
                                <line x1="320" y1="80" x2="360" y2="80" stroke="#3b82f6" strokeWidth="2" markerEnd="url(#arrowhead)" />

                                {/* Agent */}
                                <rect x="360" y="60" width="80" height="40" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" strokeWidth="2" rx="4" />
                                <text x="400" y="87" textAnchor="middle" fill="#e2e8f0" fontSize="12" fontWeight="bold">Agent</text>
                                <text x="400" y="135" textAnchor="middle" fill="#94a3b8" fontSize="10">Detect Tasks</text>

                                {/* Arrow 4 */}
                                <line x1="440" y1="80" x2="480" y2="80" stroke="#3b82f6" strokeWidth="2" markerEnd="url(#arrowhead)" />

                                {/* Output */}
                                <circle cx="550" cy="80" r="30" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" strokeWidth="2" />
                                <text x="550" y="87" textAnchor="middle" fill="#3b82f6" fontSize="14" fontWeight="bold">OK</text>
                                <text x="550" y="130" textAnchor="middle" fill="#94a3b8" fontSize="12">Output</text>
                            </svg>
                        </Motion>

                        {/* Key Features */}
                        <Motion
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 0.4 }}
                            className="space-y-4"
                        >
                            <h3 className="text-lg font-bold mb-6">Core Capabilities</h3>
                            {[
                                { title: 'real-time processing', desc: 'Sub-second latency for live lectures', icon: 'LAT' },
                                { title: 'Speaker Adaptation', desc: 'Learns individual speech patterns', icon: 'SPK' },
                                { title: 'Multi-source Integration', desc: 'Combines audio, slides, and board content', icon: 'MUX' },
                                { title: 'Confidence Scoring', desc: 'Validates extracted information', icon: 'SCR' },
                            ].map((feature, i) => (
                                <Motion
                                    key={i}
                                    initial={{ opacity: 0, x: -20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    transition={{ delay: 0.45 + i * 0.05 }}
                                    className="glass p-4 rounded-lg flex items-center gap-4"
                                >
                                    <div className="metric-badge"><Icon name={feature.icon} /></div>
                                    <div>
                                        <div className="font-bold text-blue-400">{feature.title}</div>
                                        <div className="text-sm text-slate-400">{feature.desc}</div>
                                    </div>
                                </Motion>
                            ))}
                        </Motion>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [currentPage, setCurrentPage] = useState('home');

            const renderPage = () => {
                switch(currentPage) {
                    case 'home': return <HomePage />;
                    case 'voice': return <VoicePage />;
                    case 'notes': return <NotesPage />;
                    case 'reminders': return <RemindersPage />;
                    case 'board': return <BoardPage />;
                    case 'tech': return <TechPage />;
                    default: return <HomePage />;
                }
            };

            return (
                <div className="min-h-screen animated-bg">
                    <div className="ambient">
                        <div className="orb orb-one"></div>
                        <div className="orb orb-two"></div>
                        <div className="orb orb-three"></div>
                    </div>
                    <Navigation currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main>
                        {renderPage()}
                    </main>
                    
                    {/* Footer */}
                    <footer className="glass border-t mt-20 py-8 text-center text-slate-400 text-sm">
                        <p>Micronyx © 2026 • Transforming Speech Into Intelligence</p>
                    </footer>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
